name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install OpenCV system libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1 libglib2.0-0
      - name: Install pipeline dependencies
        run: pip install -r requirements-pipeline.txt
      - name: Import smoke
        run: python -c "import ppe_monitoring; from ppe_monitoring.config import load_config; from ppe_monitoring.video_id import resolve_video_id; print(resolve_video_id('x.mp4', None))"
      - name: Unit tests
        run: python -m unittest discover -s tests -v
