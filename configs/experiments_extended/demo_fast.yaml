# E: demo-oriented preset — slightly higher sampling + more frequent forced infer for smoother overlays.
# Compare visually against baseline.yaml on the same clip (preview can be enabled manually).

pipeline:
  display_preview: false
  resize_to: [640, 640]
  sampling_fps: 15.0
  mode: "motion_gated"
  force_infer_every_n_frames: 20

motion:
  enabled: true
  min_ratio: 0.0015
  min_ratio_off: 0.0008
  hold_frames_after_motion: 10

roi:
  enabled: true
  person_roi_inference_enabled: true
  global_inference_in_roi: true
  person_center_must_be_in_roi: true

model:
  imgsz: 640
  roi_imgsz: 320
  use_half: true
  auto_backend_resolve: false
  backend_priority: ["pt"]
  device: "cpu"
  enable_person_fallback: true

event_logic:
  hardhat_confirm_frames: 2
  hardhat_revoke_frames: 4
  lock_after_confirm: true
  no_hardhat_consecutive_frames: 15
  no_hardhat_seconds_threshold: 1.5
  cooldown_frames: 75
  cooldown_seconds: 2.5

visualization:
  draw_tracker_boxes: true
  draw_person_boxes: true
  draw_head_hardhat_boxes: true
  show_violation_banner: true
  show_violation_dot: true

tracking:
  history_len: 10
  max_area_growth_ratio: 1.9
  max_width_growth_ratio: 1.45
  max_height_growth_ratio: 1.45
  min_iou_if_growth_triggered: 0.12
  blend_alpha: 0.35
  transfer_iou_threshold: 0.35
  max_transfer_gap_frames: 20
  headlike_dedup_iou: 0.45
