# Ablation preset: proposed pipeline without motion gating.
# Keeps ROI + temporal logic, but disables motion detector influence.
# With motion.enabled=false, InferenceGate falls back to sampling-only (see docs/ablation_protocol.md).

pipeline:
  display_preview: false
  resize_to: [640, 640]
  sampling_fps: 12.0
  mode: "motion_gated"
  force_infer_every_n_frames: 30

motion:
  enabled: false

roi:
  enabled: true
  person_roi_inference_enabled: true
  global_inference_in_roi: true
  person_center_must_be_in_roi: true

model:
  imgsz: 640
  roi_imgsz: 320
  use_half: true
  auto_backend_resolve: false
  backend_priority: ["pt"]
  device: "cpu"
  enable_person_fallback: true

event_logic:
  hardhat_confirm_frames: 2
  hardhat_revoke_frames: 4
  lock_after_confirm: true
  no_hardhat_consecutive_frames: 20
  no_hardhat_seconds_threshold: 2.0
  cooldown_frames: 90
  cooldown_seconds: 3.0
