# Baseline preset for VKR comparisons.
# Naive frame-first style: every frame sampled, no motion gate, no ROI, no temporal smoothing.
# Person fallback is ON so baseline-vs-proposed deltas isolate motion/ROI/temporal (not detector stack).

pipeline:
  display_preview: false
  resize_to: [640, 640]
  sampling_fps: 0.0
  mode: "every_sample"
  force_infer_every_n_frames: 1

motion:
  enabled: false

roi:
  enabled: false

model:
  imgsz: 640
  roi_imgsz: 320
  use_half: true
  # E2 / VKR: fixed inference stack for comparable latency (no auto OpenVINO/ONNX). Use device "0" on CUDA.
  auto_backend_resolve: false
  backend_priority: ["pt"]
  device: "cpu"
  enable_person_fallback: true

event_logic:
  hardhat_confirm_frames: 1
  hardhat_revoke_frames: 1
  lock_after_confirm: false
  no_hardhat_consecutive_frames: 1
  no_hardhat_seconds_threshold: 0.0
  cooldown_frames: 1
  cooldown_seconds: 0.0
