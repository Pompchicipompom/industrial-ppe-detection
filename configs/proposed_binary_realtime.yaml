pipeline:
  display_preview: false
  sampling_fps: 12.0
  mode: "motion_gated"
  force_infer_every_n_frames: 20
  max_frames: 180

motion:
  enabled: true
  min_ratio: 0.0015
  min_ratio_off: 0.0008
  hold_frames_after_motion: 10

model:
  detector_backend: "binary_hardhat"
  binary_weights_path: "models/hardhat_binary_best.pt"
  binary_conf_threshold: 0.20
  binary_imgsz: 512
  binary_class_with_hardhat: "with_hard_hat"
  binary_class_without_hardhat: "without_hard_hat"
  auto_backend_resolve: false
  device: "cpu"
  enable_person_fallback: false
  person_min_conf: 0.20

filters:
  person_confirmation_mode: "off"

event_logic:
  hardhat_confirm_frames: 2
  hardhat_revoke_frames: 4
  lock_after_confirm: true
  no_hardhat_consecutive_frames: 20
  no_hardhat_seconds_threshold: 2.0
  cooldown_frames: 90
  cooldown_seconds: 3.0
