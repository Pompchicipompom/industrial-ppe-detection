# Ablation preset: proposed pipeline without temporal consistency.
# Keeps motion gating + ROI but degrades event logic to immediate triggering.

pipeline:
  display_preview: false
  resize_to: [640, 640]
  sampling_fps: 12.0
  mode: "motion_gated"
  force_infer_every_n_frames: 30

motion:
  enabled: true
  min_ratio: 0.0015
  min_ratio_off: 0.0008
  hold_frames_after_motion: 10

roi:
  enabled: true
  person_roi_inference_enabled: true
  global_inference_in_roi: true
  person_center_must_be_in_roi: true

model:
  imgsz: 640
  roi_imgsz: 320
  use_half: true
  auto_backend_resolve: false
  backend_priority: ["pt"]
  device: "cpu"
  enable_person_fallback: true

event_logic:
  hardhat_confirm_frames: 1
  hardhat_revoke_frames: 1
  lock_after_confirm: false
  no_hardhat_consecutive_frames: 1
  no_hardhat_seconds_threshold: 0.0
  cooldown_frames: 1
  cooldown_seconds: 0.0
