pipeline:
  display_preview: false
  sampling_fps: 0.0
  mode: "every_sample"
  force_infer_every_n_frames: 1
  max_frames: 220

motion:
  enabled: false

model:
  detector_backend: "binary_hardhat"
  binary_weights_path: "models/hardhat_binary_best.pt"
  binary_conf_threshold: 0.18
  binary_imgsz: 512
  binary_class_with_hardhat: "with_hard_hat"
  binary_class_without_hardhat: "without_hard_hat"
  auto_backend_resolve: false
  device: "cpu"
  enable_person_fallback: false
  person_min_conf: 0.18

filters:
  person_confirmation_mode: "off"

event_logic:
  hardhat_confirm_frames: 1
  hardhat_revoke_frames: 1
  lock_after_confirm: false
  no_hardhat_consecutive_frames: 2
  no_hardhat_seconds_threshold: 0.2
  cooldown_frames: 5
  cooldown_seconds: 0.2
